name: Release
on:
  push:
    tags: ['v*']
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install
      - name: Inject PostHog API key
        if: ${{ secrets.OMO_KIMI_POSTHOG_API_KEY != '' }}
        run: |
          sed -i "s/phc_placeholder_replace_in_build/${{ secrets.OMO_KIMI_POSTHOG_API_KEY }}/g" src/components/telemetry/posthog.ts
      - run: pnpm run build
      - run: pnpm run sync:skills
      - run: pnpm run sync:hooks
      - run: zip -r oh-my-kimicode.zip plugin scripts bin package.json
      - uses: softprops/action-gh-release@v2
        with:
          files: oh-my-kimicode.zip
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
