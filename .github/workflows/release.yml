name: Release
'on':
  push:
    tags: ['v*']
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: '26.5.0'
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install
      - name: Inject PostHog API key
        env:
          OMO_KIMI_POSTHOG_API_KEY: ${{ secrets.OMO_KIMI_POSTHOG_API_KEY }}
        run: |
          if [ -n "$OMO_KIMI_POSTHOG_API_KEY" ]; then
            sed -i "s/phc_placeholder_replace_in_build/$OMO_KIMI_POSTHOG_API_KEY/g" src/components/telemetry/posthog.ts
          fi
      - run: pnpm run build
      - run: pnpm run sync:skills
      - run: zip -r lazykimicode.zip plugin scripts bin dist package.json
      - uses: softprops/action-gh-release@v3
        with:
          files: lazykimicode.zip
      - run: npm publish --provenance
